<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#0e2258"/>
      <stop offset="100%" stop-color="#060c1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity=".38"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>
  <!-- Center glow -->
  <circle cx="16" cy="16" r="9" fill="url(#glow)"/>
  <!-- Axon lines: 6 directions, alternating teal / blue -->
  <line x1="16" y1="16" x2="16"   y2="6.5"  stroke="#14b8a6" stroke-width="1.3" stroke-linecap="round" stroke-opacity=".8"/>
  <line x1="16" y1="16" x2="24.2" y2="11.2" stroke="#60a5fa" stroke-width="1.3" stroke-linecap="round" stroke-opacity=".8"/>
  <line x1="16" y1="16" x2="24.2" y2="20.8" stroke="#14b8a6" stroke-width="1.3" stroke-linecap="round" stroke-opacity=".8"/>
  <line x1="16" y1="16" x2="16"   y2="25.5" stroke="#60a5fa" stroke-width="1.3" stroke-linecap="round" stroke-opacity=".8"/>
  <line x1="16" y1="16" x2="7.8"  y2="20.8" stroke="#14b8a6" stroke-width="1.3" stroke-linecap="round" stroke-opacity=".8"/>
  <line x1="16" y1="16" x2="7.8"  y2="11.2" stroke="#60a5fa" stroke-width="1.3" stroke-linecap="round" stroke-opacity=".8"/>
  <!-- End nodes -->
  <circle cx="16"   cy="6.5"  r="2.2" fill="#14b8a6"/>
  <circle cx="24.2" cy="11.2" r="2"   fill="#60a5fa"/>
  <circle cx="24.2" cy="20.8" r="2.2" fill="#14b8a6"/>
  <circle cx="16"   cy="25.5" r="2"   fill="#60a5fa"/>
  <circle cx="7.8"  cy="20.8" r="2.2" fill="#14b8a6"/>
  <circle cx="7.8"  cy="11.2" r="2"   fill="#60a5fa"/>
  <!-- Central soma -->
  <circle cx="16" cy="16" r="5" fill="#14b8a6"/>
  <!-- Highlight -->
  <circle cx="14.6" cy="14.6" r="1.85" fill="rgba(255,255,255,.72)"/>
</svg>
